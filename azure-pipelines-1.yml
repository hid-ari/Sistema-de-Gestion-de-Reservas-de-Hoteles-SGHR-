trigger:
- main

pool:
  vmImage: 'windows-latest'

stages:

# 🔹 STAGE BUILD
- stage: Build
  jobs:
  - job: BuildJob
    steps:

    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: dotnet restore
      displayName: 'Restore'

    - script: dotnet build --configuration Release
      displayName: 'Build'

    - script: dotnet publish -c Release -o $(Build.ArtifactStagingDirectory)
      displayName: 'Publish'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'

# 🔹 STAGE DEV (esto reemplaza Release clásico)
- stage: Dev
  dependsOn: Build
  jobs:
  - job: DeployDev
    steps:
    - script: echo "Deploy en ambiente DEV exitoso"
      displayName: 'Deploy Dev'